services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 4G

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 512M

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
    ports:
      - "8001:80"
    command:
      - "--model-id"
      - "BAAI/bge-small-en-v1.5"
      - "--max-client-batch-size"
      - "32"
      - "--max-batch-tokens"
      - "32768"
      - "--auto-truncate"
    volumes:
      - tei_cache:/data
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  qdrant_data:
  redis_data:
  tei_cache:
